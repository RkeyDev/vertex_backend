services:

  # ── Spring Boot backend ──────────────────────────────────────────────────────
  backend:
    build: .
    container_name: vertex-backend
    restart: unless-stopped
    ports:
      - "${VERTEX_BACKEND_PORT:-9080}:8080"
    environment:
      # Database
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}

      # JWT
      - APPLICATION_SECURITY_JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - APPLICATION_SECURITY_JWT_EXPIRATION=86400000
      - APPLICATION_SECURITY_JWT_REFRESH_TOKEN_EXPIRATION=604800000

      # MailTrap
      - MAILTRAP_TOKEN=${MAILTRAP_TOKEN}
      - MAILTRAP_SANDBOX=${MAILTRAP_SANDBOX:-true}
      - MAILTRAP_INBOX_ID=${MAILTRAP_INBOX_ID}
      - APPLICATION_FRONTEND_URL=${FRONTEND_URL}

      # Redis
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_USER=${REDIS_USER}
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      # Export volume — must match the mount path below.
      # DownloadController resolves artifact paths against this root.
      - EXPORT_OUTPUT_ROOT=/app/exports

    volumes:
      - exports_data:/app/exports    # shared with export workers

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - vertex-network


  # ── Python export workers (3 replicas) ──────────────────────────────────────
  export-worker:
    build: ../vertex_export_worker
    restart: unless-stopped
    deploy:
      replicas: 3
    volumes:
      - exports_data:/app/exports    # workers write to /app/exports/output/...
    environment:
      - REDIS_HOST=vertex-cache
      - REDIS_PORT=6379
      # Worker output dir — must sit inside the shared volume mount above.
      # ExportService._resolve_output_path() writes relative paths starting
      # with "output/", so the full path becomes /app/exports/output/...
      - OUTPUT_BASE_DIR=/app/exports/output
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets Playwright reach the Vite dev server
    depends_on:
      redis:
        condition: service_started
    networks:
      - vertex-network


  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vertex-db
    restart: always
    stop_grace_period: 1m
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vertex-network


  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vertex-cache
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - vertex-network


networks:
  vertex-network:
    driver: bridge


volumes:
  postgres_data:
  exports_data:    # shared between backend and all export-worker replicas