# ============================================================
# Test profile — runs without any live external services
# ============================================================

# H2 in-memory database (replaces PostgreSQL for tests)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Redis auto-configuration (no Redis in CI)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# JWT — dummy 256-bit base64-encoded secret key
application.security.jwt.secret-key=dGVzdFNlY3JldEtleUZvclZlcnRleEJhY2tlbmRUZXN0aW5nMTIzNA==
application.security.jwt.expiration=3600000

# Mailtrap — dummy values; EmailService is mocked in unit tests
# and disabled from crashing at startup in context tests
MAILTRAP_TOKEN=dummy_test_token
MAILTRAP_SANDBOX=false

# Application
application.frontend.url=http://localhost:5174
